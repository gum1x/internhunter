services:
  app:
    build: .
    command: internhunter serve --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      INTERNHUNTER_DB_PATH: /data/internhunter.db
      INTERNHUNTER_CACHE_DIR: /data/.cache
      INTERNHUNTER_SEARXNG_URL: http://searxng:8080
    volumes:
      - internhunter_data:/data
    depends_on:
      - searxng
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:8888/
    volumes:
      - searxng_config:/etc/searxng
    restart: unless-stopped

volumes:
  internhunter_data:
  searxng_config:
