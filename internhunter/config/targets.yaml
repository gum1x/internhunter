# Target firms + keyword/filter layer. This is the ONE file to edit as your list grows —
# no code changes needed. Evaluated by internhunter/match/targets.py against every
# discovered job; the alert pipeline (`internhunter notify`) pushes a job when it matches
# here OR clears the discovery-score bar (INTERNHUNTER_NOTIFY_MIN_FIT).
#
# Matching semantics:
#   - a job at a listed firm matches when its title also passes the keyword gates below
#   - a job anywhere matches when its title contains any `keywords.include` entry
#   - `keywords.exclude` is a hard veto (senior/staff roles never alert)
#   - `locations` empty = anywhere; remote jobs pass whenever `remote_ok: true`

