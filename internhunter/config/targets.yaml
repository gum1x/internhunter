keywords:
  # A job title containing ANY of these matches (case-insensitive substring).
  include:
    - intern
    - internship
    - co-op
    - "summer analyst"
    - "quant research"
    - "quantitative research"
    - "quantitative trading"
    - "trading intern"
    - "founding engineer"
    - "founding team"
    - "first engineer"
    - "growth strategist"
    - "growth intern"
    - "growth associate"
  # Hard veto — never alert on these regardless of firm or score.
  exclude:
    - senior
    - staff
    - principal
    - director
    - "vp "
    - "vice president"
    - manager, sr
    - "sr."
    - lead
    - recruiter   # "Campus Recruiter" classifies as internship-adjacent; it isn't one
    - phd

# Seniority bands you care about; informational tags used in match reasons.
seniority: [intern, early, founding]

# Empty list = any location. Add entries like "New York", "Washington", "San Francisco"
# to restrict on-site roles; remote roles always pass while remote_ok is true.
locations: []
remote_ok: true

# For sources that expose funding stage (YC / VC-portfolio / Wellfound discovery),
# keep companies in these stages. Ignored by sources that don't know the stage.
funding_stages: [pre-seed, seed, series-a, series-b]
