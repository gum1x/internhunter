# Your network graph: firms/domains -> people who can warm-intro you. Edit freely —
# evaluated by internhunter/referrals.py on every alert and tracker entry. When a matched
# posting hits a firm listed here it is flagged "warm intro" (🤝) and a draft
# intro-request message is generated; everything else is a cold apply (❄️).
#
# Fields per connection:
#   name          who you'd ask
#   relationship  how you know them (used in the draft message)
#   contact       email / Telegram handle / phone — however you reach them
#   firms         company names this person can open doors at (fuzzy-matched on slug)
#   domains       company domains, matched against a job's company_domain
#   tags          free-form labels
#   notes         anything else

connections:
