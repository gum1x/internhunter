<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InternHunter</title>
  <script src="https://unpkg.com/htmx.org@2"></script>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      padding: 2rem;
      background: #14161a;
      color: #e6e6e6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
    }
    h1 { margin: 0 0 1rem; font-size: 1.4rem; }
    .stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat {
      background: #1e2127;
      border: 1px solid #2c3038;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      min-width: 110px;
    }
    .stat .num { font-size: 1.5rem; font-weight: 600; color: #7ec699; }
    .stat .label { font-size: 0.75rem; color: #9aa0aa; text-transform: uppercase; }
    form.filters { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    input, select {
      background: #1e2127;
      color: #e6e6e6;
      border: 1px solid #2c3038;
      border-radius: 4px;
      padding: 0.5rem;
      font-family: inherit;
      font-size: 13px;
    }
    label { display: flex; align-items: center; gap: 0.35rem; }
    a { color: #6db3f2; }
    .csv-link {
      margin-left: auto;
      background: #2b5cff;
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 0.9rem;
      border-radius: 4px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.55rem 0.6rem; border-bottom: 1px solid #262a31; }
    th { color: #9aa0aa; font-weight: 600; position: sticky; top: 0; background: #14161a; }
    tbody tr:hover { background: #1b1e24; }
    .empty { color: #6c7280; text-align: center; }
  </style>
</head>
<body>
  <h1>InternHunter</h1>

  <div class="stats">
    <div class="stat"><div class="num">{{ stats.total }}</div><div class="label">Total Jobs</div></div>
    <div class="stat"><div class="num">{{ stats.internships }}</div><div class="label">Internships</div></div>
    <div class="stat"><div class="num">{{ stats.companies }}</div><div class="label">Companies</div></div>
    <div class="stat"><div class="num">{{ stats.remote }}</div><div class="label">Remote</div></div>
  </div>

  <form class="filters"
        hx-get="/jobs"
        hx-target="#jobs"
        hx-trigger="keyup changed delay:300ms from:input, change">
    <input type="search" name="q" value="{{ q }}" placeholder="Search title or company">
    <select name="ats">
      <option value="">All ATS</option>
      {% for option in ats_options %}
      <option value="{{ option }}" {% if option == ats %}selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>
    <label><input type="checkbox" name="remote" value="true" {% if remote %}checked{% endif %}> Remote</label>
    <select name="sort">
      <option value="discovery_score" {% if sort == "discovery_score" %}selected{% endif %}>Discovery score</option>
      <option value="fit" {% if sort == "fit" %}selected{% endif %}>Fit (profile match)</option>
      <option value="freshness_score" {% if sort == "freshness_score" %}selected{% endif %}>Freshness</option>
      <option value="posted_at" {% if sort == "posted_at" %}selected{% endif %}>Posted (newest)</option>
      <option value="deadline_at" {% if sort == "deadline_at" %}selected{% endif %}>Deadline (soonest)</option>
      <option value="company" {% if sort == "company" %}selected{% endif %}>Company (A-Z)</option>
      <option value="title" {% if sort == "title" %}selected{% endif %}>Title (A-Z)</option>
    </select>
    <a class="csv-link" href="/export.csv?{{ {'q': q, 'ats': ats, 'remote': 'true' if remote else '', 'sort': sort}|urlencode }}">Download CSV</a>
  </form>

  <div id="jobs">
    {% include "_table.html" %}
  </div>
</body>
</html>
