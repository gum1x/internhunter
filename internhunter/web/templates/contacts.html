{% extends "base.html" %}
{% block title %}InternHunter — Contacts{% endblock %}
{% block content %}
<h1 class="page-title">Contacts</h1>
<p class="page-sub">Recruiters &amp; hiring managers for discovered companies, with confidence-labelled emails.</p>

<form class="toolbar"
      hx-get="/contacts"
      hx-target="#contacts" hx-select="#contacts" hx-swap="outerHTML"
      hx-push-url="true" hx-indicator="#contacts"
      hx-trigger="keyup changed delay:300ms from:input, change">
  <span class="input-icon grow">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="search" name="company" value="{{ company }}" placeholder="Filter by company" aria-label="Filter by company">
  </span>
  <select name="role" aria-label="Filter by role">
    <option value="">All roles</option>
    {% for option in role_options %}
    <option value="{{ option }}" {% if option == role %}selected{% endif %}>{{ option }}</option>
    {% endfor %}
  </select>
  <select name="label" aria-label="Filter by confidence">
    <option value="">All confidence</option>
    <option value="verified" {% if label == "verified" %}selected{% endif %}>verified</option>
    <option value="probable" {% if label == "probable" %}selected{% endif %}>probable</option>
    <option value="guessed" {% if label == "guessed" %}selected{% endif %}>guessed</option>
  </select>
  <label class="check"><input type="checkbox" name="has_email" value="true" {% if has_email %}checked{% endif %}> Has email</label>
  <a class="btn btn-outline btn-sm push" href="/contacts/export.csv?{{ {'company': company, 'role': role, 'label': label, 'has_email': 'true' if has_email else ''}|urlencode }}">⬇ CSV</a>
</form>

<div id="contacts">
  {% include "_contacts_table.html" %}
</div>
{% endblock %}
